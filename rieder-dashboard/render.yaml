# Render.com deployment config (free tier)
services:
  - type: web
    name: macro-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 2 --timeout 120
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
